<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mídias de Promoção • Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ================= BASE ================= */

:root{
  --primary:#111827;
  --accent:#2563eb;
  --success:#16a34a;
  --danger:#dc2626;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --border:#e5e7eb;
  --radius:18px;
  --shadow-sm:0 4px 12px rgba(0,0,0,.06);
  --shadow-md:0 20px 40px rgba(0,0,0,.12);
}

*{box-sizing:border-box}

html,body{
  height:100%;
}

body.modal-open{
  overflow:hidden; /* trava apenas quando modal abrir */
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  color:var(--text);
}

/* ================= HEADER ================= */

.header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 32px;
  background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow-sm);
}

.header h1{
  font-size:18px;
  font-weight:900;
  margin:0;
}

.header button{
  height:42px;
  padding:0 22px;
  border-radius:14px;
  font-weight:800;
  font-size:13px;
  border:none;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
  transition:.25s;
}

.header button:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}

/* ================= LAYOUT ================= */

.container{
  flex:1;
  display:grid;
  grid-template-columns:380px 1fr;
  gap:24px;
  padding:24px;
  overflow:hidden;
}

/* ================= PAINEL ================= */

.panel{
  background:#fff;
  border-radius:var(--radius);
  border:1px solid var(--border);
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:16px;
  box-shadow:var(--shadow-sm);
  overflow:auto;
}

.panel h2{
  font-size:13px;
  font-weight:900;
  margin:0;
  color:var(--accent);
}

label{
  font-size:11px;
  font-weight:800;
  color:var(--muted);
}

input,select,textarea{
  height:40px;
  border-radius:12px;
  border:1px solid var(--border);
  padding:0 12px;
  font-size:13px;
  font-weight:600;
  width:100%;
}

textarea{
  height:90px;
  padding:10px;
  resize:none;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.days{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.day{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.day.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.preview{
  height:120px;
  border-radius:14px;
  border:2px dashed var(--border);
  display:grid;
  place-items:center;
  font-size:12px;
  color:var(--muted);
  overflow:hidden;
}

.preview img,
.preview video{
  width:100%;
  height:100%;
  object-fit:contain;
}

button.primary{
  background:var(--accent);
  color:#fff;
  height:40px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

button.secondary{
  background:#f1f5f9;
  color:#111827;
  height:36px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

button.danger{
  background:#fee2e2;
  color:#991b1b;
  border:none;
  border-radius:10px;
}

/* ================= DIREITA ================= */

.right-area{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.search-bar{
  height:44px;
  margin-bottom:16px;
}

.search-bar input{
  width:100%;
  height:100%;
  border-radius:14px;
}

.grid{
  flex:1;
  overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
  padding-right:8px;
}

.card{
  background:#fff;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  transition:.25s;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-md);
}

.media{
  height:160px;
  background:#000;
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.media img,
.media video{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.meta{
  padding:14px;
  font-size:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.badge{
  font-size:10px;
  font-weight:900;
  padding:4px 8px;
  border-radius:999px;
  width:fit-content;
  background:#e5edff;
  color:var(--accent);
}

.badge.on{background:#dcfce7;color:#166534;}
.badge.off{background:#f1f5f9;color:#64748b;}

.actions{
  display:flex;
  gap:6px;
  padding:12px;
}

.actions button{
  flex:1;
  height:34px;
  font-size:11px;
  font-weight:700;
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.modal.open{
  opacity:1;
  pointer-events:all;
}

.modal-box{
  width:95%;
  max-width:1200px;
  height:85vh;
  background:#fff;
  border-radius:20px;
  display:grid;
  grid-template-columns:1fr 360px;
  box-shadow:var(--shadow-md);
  overflow:hidden;
}

/* SCROLL LADO ESQUERDO */
.buffet-wrap{
  padding:24px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.buffet-list{
  flex:1;
  overflow-y:auto;
  padding-right:6px;
}

/* SCROLL LADO DIREITO */
.edit-area{
  border-left:1px solid var(--border);
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow-y:auto;
}

.buffet-wrap{
  padding:24px;
  display:flex;
  flex-direction:column;
}

.filters{
  display:flex;
  gap:12px;
  margin-bottom:16px;
}

.buffet-list{
  flex:1;
  overflow-y:auto;
  display:grid;
  gap:12px;
}

.buffet-item{
  display:flex;
  gap:12px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:14px;
  cursor:pointer;
  transition:.2s;
}

.buffet-item:hover{
  background:#f9fafb;
}

.buffet-item img{
  width:60px;
  height:60px;
  border-radius:10px;
  object-fit:cover;
}

.toggle{
  margin-left:auto;
  height:28px;
  padding:0 10px;
  border:none;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  cursor:pointer;
}

.toggle.on{background:#dcfce7;color:#166534;}
.toggle.off{background:#f1f5f9;color:#6b7280;}

.edit-area{
  border-left:1px solid var(--border);
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.edit-area h3{
  margin:0;
  font-size:14px;
  font-weight:900;
}

@media(max-width:1000px){
  .container{grid-template-columns:1fr;}
  .modal-box{grid-template-columns:1fr;}
}


/* =====================================================
   MOBILE & TABLET OTIMIZADO PROFISSIONAL
===================================================== */

@media (max-width: 1024px){

  /* HEADER MAIS COMPACTO */
  .header{
    height:56px;
    padding:0 16px;
  }

  .header h1{
    font-size:15px;
  }

  .header button{
    height:34px;
    font-size:11px;
    padding:0 14px;
    border-radius:10px;
  }

  /* LAYOUT 1 COLUNA */
  .container{
    grid-template-columns:1fr;
    padding:14px;
    gap:14px;
  }

  /* PAINEL MAIS COMPACTO */
  .panel{
    padding:16px;
    gap:10px;
  }

  .panel h2{
    font-size:11px;
  }

  input,select,textarea{
    height:34px;
    font-size:12px;
    border-radius:10px;
  }

  textarea{
    height:70px;
  }

  .row{
    gap:8px;
  }

  .day{
    font-size:10px;
    padding:5px 10px;
  }

  .preview{
    height:90px;
    font-size:11px;
  }

  button.primary{
    height:36px;
    font-size:12px;
  }

  /* GRID MAIS INTELIGENTE */
  .grid{
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:12px;
  }

  .media{
    height:110px;
  }

  .meta{
    padding:10px;
    font-size:11px;
  }

  .actions{
    padding:8px;
  }

  .actions button{
    height:28px;
    font-size:10px;
  }

  /* MODAL FULLSCREEN MOBILE */
  .modal-box{
    width:100%;
    height:100%;
    border-radius:0;
    grid-template-columns:1fr;
  }

  .buffet-wrap{
    padding:16px;
  }

  .filters{
    flex-direction:column;
    gap:8px;
  }

  .edit-area{
    padding:16px;
    border-left:none;
    border-top:1px solid var(--border);
  }

  .buffet-item{
    padding:10px;
  }

  .buffet-item img{
    width:50px;
    height:50px;
  }

}
</style>
</head>
<body>

<div class="header">
  <h1>Mídias do Cardápio</h1>
  <button onclick="openBuffetModal()">🍽️ Ver Itens do Cardápio</button>
</div>

<div class="container">

  <div class="panel">

    <h2>NOVA PROMOÇÃO</h2>

    <label>Arquivo</label>
    <input id="file" type="file" accept="image/*,video/*">

    <div class="row">
      <select id="tipo">
        <option value="IMG">Imagem</option>
        <option value="VIDEO">Vídeo</option>
      </select>

      <div class="row">
        <input id="hora_inicio" type="time" value="00:00">
        <input id="hora_fim" type="time" value="23:59">
      </div>
    </div>

    <div class="days">
      <div class="day" data-v="1">Seg</div>
      <div class="day" data-v="2">Ter</div>
      <div class="day" data-v="3">Qua</div>
      <div class="day" data-v="4">Qui</div>
      <div class="day" data-v="5">Sex</div>
      <div class="day" data-v="6">Sáb</div>
      <div class="day" data-v="7">Dom</div>
    </div>

    <div class="preview" id="preview">Pré-visualização</div>
    <button class="primary" onclick="addPromo()">Salvar Promoção</button>

  </div>

  <div class="right-area">
    <div class="search-bar">
      <input id="searchPromo" placeholder="Pesquisar..." oninput="loadPromos()">
    </div>
    <div class="grid" id="grid"></div>
  </div>

</div>

<!-- ================= MODAL ================= -->

<div id="buffetModal" class="modal" onclick="if(event.target.id==='buffetModal')closeBuffetModal()">
  <div class="modal-box">

    <div class="buffet-wrap">
      <div class="filters">
        <input id="buscaBuffet" placeholder="Buscar..." oninput="renderBuffet()">
<select id="filtroSetor" onchange="renderBuffet()"></select>
      </div>
      <div id="buffetList" class="buffet-list"></div>
    </div>

    <div class="edit-area">
      <h3>Editar Item</h3>
      <input id="editNome" placeholder="Nome">
      <textarea id="editDesc" placeholder="Descrição"></textarea>
      <input id="editFoto" type="file" accept="image/*">
      <button class="primary" onclick="salvarItem()">Salvar</button>
      <button class="secondary" onclick="closeBuffetModal()">Fechar</button>
    </div>

  </div>
</div>

<script>

/* ===================== SUPABASE ===================== */

const sb = supabase.createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

/* ===================== PROMOÇÕES ===================== */

const fileInput=document.getElementById("file");
const tipoInput=document.getElementById("tipo");
const horaInicioInput=document.getElementById("hora_inicio");
const horaFimInput=document.getElementById("hora_fim");
const preview=document.getElementById("preview");
const grid=document.getElementById("grid");

let diasSel=[];
let editingPromoId=null;

document.querySelectorAll(".day").forEach(d=>{
  d.onclick=()=>{
    d.classList.toggle("active");
    const v=+d.dataset.v;
    diasSel.includes(v)?diasSel=diasSel.filter(x=>x!==v):diasSel.push(v);
  };
});

fileInput.onchange=()=>{
  const f=fileInput.files[0];
  if(!f)return;
  preview.innerHTML=f.type.startsWith("video")
  ? `<video src="${URL.createObjectURL(f)}" autoplay muted loop></video>`
  : `<img src="${URL.createObjectURL(f)}">`;
};

async function loadPromos(){
  const termo=(searchPromo.value||"").toLowerCase();
  const {data}=await sb.from("promocoes").select("*").order("created_at",{ascending:false});

  grid.innerHTML=(data||[])
  .filter(p=>(p.tipo||"").toLowerCase().includes(termo))
  .map(p=>`
    <div class="card">
      <div class="media">
        ${p.tipo==="VIDEO"
          ? `<video src="${p.url}" muted autoplay loop></video>`
          : `<img src="${p.url}">`}
      </div>
      <div class="meta">
        <span class="badge ${p.ativo?'on':'off'}">
          ${p.tipo} • ${p.ativo?'ON':'OFF'}
        </span>
        <div>⏰ ${p.hora_inicio} → ${p.hora_fim}</div>
      </div>
      <div class="actions">
        <button onclick="editarPromo('${p.id}')">Editar</button>
        <button onclick="togglePromo('${p.id}',${p.ativo})">${p.ativo?'Off':'On'}</button>
        <button class="danger" onclick="delPromo('${p.id}')">X</button>
      </div>
    </div>
  `).join("");
}

async function addPromo(){
  if(!diasSel.length)return alert("Selecione os dias");

  if(editingPromoId){
    await sb.from("promocoes").update({
      tipo:tipoInput.value,
      dias_semana:diasSel,
      hora_inicio:horaInicioInput.value,
      hora_fim:horaFimInput.value
    }).eq("id",editingPromoId);

    editingPromoId=null;
    resetForm();
    loadPromos();
    return;
  }

  const f=fileInput.files[0];
  if(!f)return alert("Selecione um arquivo");

  const ext=f.name.split(".").pop();
  const path=`promocoes/${Date.now()}.${ext}`;

  await sb.storage.from("promocoes").upload(path,f);
  const {data:urlData}=sb.storage.from("promocoes").getPublicUrl(path);

  await sb.from("promocoes").insert({
    url:urlData.publicUrl,
    tipo:tipoInput.value,
    dias_semana:diasSel,
    hora_inicio:horaInicioInput.value,
    hora_fim:horaFimInput.value,
    ativo:true
  });

  resetForm();
  loadPromos();
}

async function togglePromo(id,ativo){
  await sb.from("promocoes").update({ativo:!ativo}).eq("id",id);
  loadPromos();
}

async function delPromo(id){
  if(!confirm("Excluir mídia?"))return;
  await sb.from("promocoes").delete().eq("id",id);
  loadPromos();
}

async function editarPromo(id){
  const {data}=await sb.from("promocoes").select("*").eq("id",id).single();
  editingPromoId=id;
  tipoInput.value=data.tipo;
  horaInicioInput.value=data.hora_inicio;
  horaFimInput.value=data.hora_fim;
  diasSel=data.dias_semana||[];
}

function resetForm(){
  fileInput.value="";
  preview.innerHTML="Pré-visualização";
  diasSel=[];
}

loadPromos();

/* ===================== BUFFET ===================== */

let buffetItems=[];
let currentEdit=null;

async function openBuffetModal(){
  document.body.classList.add("modal-open");
  document.getElementById("buffetModal").classList.add("open");
  await carregarSetores();   // 👈 AQUI
  loadBuffet();
}

function closeBuffetModal(){
  document.body.classList.remove("modal-open");
  document.getElementById("buffetModal").classList.remove("open");
}

async function loadBuffet(){
  const {data}=await sb.from("buffet")
    .select("id,nome,descricao,foto_url,cardapio,tipo")
    .order("nome");

  buffetItems=data||[];
  renderBuffet();
}

function renderBuffet(){
  const term=(buscaBuffet.value||"").toLowerCase();
  const setor=filtroSetor.value;

  buffetList.innerHTML=buffetItems
  .filter(i=>
    (i.nome||"").toLowerCase().includes(term) &&
    (!setor||i.tipo===setor)
  )
  .map(i=>`
    <div class="buffet-item" onclick="selectItem('${i.id}')">
      <img src="${i.foto_url||''}">
      <div>
        <b>${i.nome}</b><br>
        <small>${i.descricao||''}</small><br>
        <small style="opacity:.6">${i.tipo||''}</small>
      </div>
      <button class="toggle ${i.cardapio?'on':'off'}"
        onclick="toggleCardapio(event,'${i.id}',${i.cardapio})">
        ${i.cardapio?'NO CARDÁPIO':'FORA'}
      </button>
    </div>
  `).join("");
}

function selectItem(id){
  currentEdit=buffetItems.find(i=>i.id===id);
  editNome.value=currentEdit.nome||"";
  editDesc.value=currentEdit.descricao||"";
}

async function toggleCardapio(ev,id,atual){
  ev.stopPropagation();
  await sb.from("buffet").update({cardapio:!atual}).eq("id",id);
  loadBuffet();
}

async function salvarItem(){
  if(!currentEdit)return;
  let foto_url=currentEdit.foto_url;

  const f=editFoto.files[0];
  if(f){
    const ext=f.name.split(".").pop();
    const path=`buffet/${Date.now()}.${ext}`;
    await sb.storage.from("buffet").upload(path,f);
    foto_url=sb.storage.from("buffet").getPublicUrl(path).data.publicUrl;
  }

  await sb.from("buffet")
    .update({
      nome:editNome.value,
      descricao:editDesc.value,
      foto_url
    })
    .eq("id",currentEdit.id);

  loadBuffet();
}
async function carregarSetores(){
  const { data, error } = await sb
    .from("buffet")
    .select("tipo")
    .not("tipo","is",null);

  if(error){
    console.error(error);
    return;
  }

  // pegar apenas valores únicos
  const tiposUnicos = [...new Set(data.map(i => i.tipo).filter(Boolean))];

  const select = document.getElementById("filtroSetor");

  select.innerHTML = `
    <option value="">Todos</option>
    ${tiposUnicos
      .sort()
      .map(t => `<option value="${t}">${t}</option>`)
      .join("")}
  `;
}
</script>

</body>
</html>
